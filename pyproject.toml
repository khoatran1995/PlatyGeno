[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "platygeno"
version = "0.1.0"
description = "Unsupervised Gene Discovery via Evo 2 & SAE Interpretability"
dependencies = [
    "torch",
    "biopython",
    "pandas",
    "tqdm",
    "huggingface_hub",  # Required for auto-download
    "evo-model>=0.5"    # Ensure latest version for Evo 2 support
]
